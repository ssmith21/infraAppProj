apiVersion: v1
kind: ConfigMap
metadata:
  name: welcome-html
  namespace: welcome-app
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>InfraApp - Welcome</title>
      <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 4rem auto; padding: 0 1rem; color: #222; }
        h1 { color: #0078d4; }
        code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }
        hr { border: none; border-top: 1px solid #ddd; margin: 2rem 0; }
        .security { color: #555; font-size: 0.85rem; }
      </style>
    </head>
    <body>
      <h1>Welcome to InfraApp</h1>
      <p>This page is served from an AKS cluster in Azure Canada Central.</p>
      <p>Infrastructure managed with Bicep IaC.</p>
      <hr>
      <p class="security">Security: RBAC | Network Policies | Managed Identity | NSG Isolation | Pod Security Standards | Non-root Container | Read-only Filesystem</p>
    </body>
    </html>
  nginx.conf: |
    worker_processes 1;
    error_log /tmp/error.log warn;
    pid /tmp/nginx.pid;
    events { worker_connections 128; }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      access_log /tmp/access.log;
      server {
        listen 8080;
        location / {
          root /usr/share/nginx/html;
          index index.html;
        }
      }
    }
