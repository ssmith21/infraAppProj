name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths: ['bicep/**']
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC token exchange with Azure
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        run: |
          az bicep build --file bicep/main.bicep
          az bicep build --file bicep/subscription.bicep

      - name: Bootstrap resource group
        run: |
          az deployment sub create \
            --location canadacentral \
            --template-file bicep/subscription.bicep \
            --parameters project=infraapp environment=dev location=canadacentral \
            --name "bootstrap-dev-${{ github.run_id }}"

      - name: Deploy infrastructure
        run: |
          az deployment group create \
            --resource-group infraapp-rg-dev \
            --template-file bicep/main.bicep \
            --parameters bicep/parameters/dev.bicepparam \
            --name "deploy-dev-${{ github.run_id }}"

      - name: Grant AKS RBAC Cluster Admin access
        run: |
          AKS_ID=$(az aks show \
            --resource-group infraapp-rg-dev \
            --name infraapp-aks-dev \
            --query id -o tsv)
          az role assignment create \
            --assignee 86cd7a4f-c7f9-4b69-ba37-26f42111c64d \
            --role "Azure Kubernetes Service RBAC Cluster Admin" \
            --scope "$AKS_ID" 2>/dev/null || echo "User role assignment already exists"
          az role assignment create \
            --assignee 1f065ea8-981c-42df-a080-af05b09a821b \
            --role "Azure Kubernetes Service RBAC Cluster Admin" \
            --scope "$AKS_ID" 2>/dev/null || echo "CI/CD role assignment already exists"
